<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ParaBank E2E Test Reports</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 600px; margin: 3rem auto; padding: 0 1rem; }
    h1 { color: #333; }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .card { background: #f8fafc; border-radius: 8px; padding: 1.5rem; margin: 1rem 0; }
    .card h2 { margin-top: 0; font-size: 1.1rem; }
  </style>
</head>
<body>
  <h1>ParaBank E2E Test Reports</h1>
  <p>Automated Playwright test reports for ParaBank application.</p>
  
  <div class="card">
    <h2>📊 Allure Report</h2>
    <p><a href="./allure/">View Allure Report →</a></p>
    <p style="color: #64748b; font-size: 0.9rem;">Interactive report with execution history, screenshots, and traces.</p>
  </div>

  <p style="color: #64748b; font-size: 0.85rem;">
    Reports are updated on each push to <code>main</code> or <code>master</code>.
  </p>
</body>
</html>
